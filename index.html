<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUC ランキング</title>
<style>
:root{--bg:#ffffff;--txt:#2b2b33;--mut:#9a94a0;--acc:#f2638e;--acc2:#ea4a75;--card:#ffffff;--card2:#fdf3f7;--line:#f2e6ec;--hover:#fdf1f5;--dia:#d98324}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
header{padding:18px 16px 14px;background:#fff;border-bottom:3px solid var(--acc)}
h1{margin:0;font-size:19px;color:var(--acc2);letter-spacing:.02em}
.bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:12px}
.seg{display:inline-flex;background:#fff;border:1px solid var(--acc);border-radius:9px;overflow:hidden}
.seg button{background:#fff;border:none;color:var(--acc);padding:7px 18px;cursor:pointer;font-size:13px;font-weight:600}
.seg button.active{background:var(--acc);color:#fff}
.period{font-size:14px;font-weight:700;color:#fff;background:var(--acc);padding:5px 14px;border-radius:8px}
.note{color:var(--mut);font-size:12px}
main{padding:16px 12px;max-width:1000px;margin:0 auto}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.tabs button{background:#fff;border:1px solid var(--line);color:var(--mut);padding:9px 15px;border-radius:22px;cursor:pointer;font-size:13px;font-weight:600}
.tabs button.active{background:var(--acc);color:#fff;border-color:var(--acc);box-shadow:0 2px 8px rgba(242,99,142,.3)}
.search{width:100%;max-width:300px;background:#fff;border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:10px 13px;font-size:13px;margin-bottom:14px}
.search:focus{outline:2px solid var(--acc)}
.tblwrap{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 4px 18px rgba(234,74,117,.06)}
th{background:#fff;box-shadow:inset 0 -1px 0 var(--line),0 2px 6px rgba(0,0,0,.05);z-index:2}
/* 当月・前月は「今週LUC」列を非表示（LUCは週間のみ） */
.mode-mtd .c-weekLuc,.mode-month .c-weekLuc{display:none}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
th,td{padding:11px 12px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
th{color:var(--mut);font-weight:700;position:sticky;top:0;background:#fff;cursor:pointer;user-select:none}
th.sorted{color:var(--acc2)}
tbody tr:hover{background:var(--hover)}
tbody tr:nth-child(-n+3){background:#fff8fb}
.num{text-align:right;font-variant-numeric:tabular-nums}
.rk{color:var(--mut);width:36px;font-weight:600}
.rk.top{color:var(--acc2);font-weight:800}
.name{font-weight:600}
.pill{font-size:11px;padding:2px 9px;border-radius:20px}
.pill.neo{background:#eef1ff;color:#5b6bd6}.pill.itk{background:#ffe9f1;color:var(--acc2)}
.dia{color:var(--dia);font-weight:600}.grn{color:#e0468b}.muted{color:var(--mut)}
.sorted{color:var(--acc2);font-weight:700}
.empty{padding:44px;text-align:center;color:var(--mut)}
.foot{color:var(--mut);font-size:11px;text-align:center;padding:18px}
@media (max-width:640px){
  h1{font-size:16px}
  main{padding:10px 8px}
  .tabs button{padding:8px 12px;font-size:12px}
  th,td{padding:10px 8px;font-size:13px}
  .name{white-space:normal;word-break:break-word}
  /* スマホは「順位＋名前＋選択中の項目」だけ表示（横スクロール不要） */
  th.c-metric,td.c-metric{display:none}
  .m-diamond .c-diamond,.m-timeSec .c-timeSec,.m-days .c-days,.m-videos .c-videos,.m-weekLuc .c-weekLuc,.m-newCum .c-newCum{display:table-cell}
}
</style>
</head>
<body>
<header>
  <h1>🏆 LUC ランキング</h1>
  <div class="bar">
    <div class="seg" id="modeSeg">
      <button data-mode="week" class="active">週間</button>
      <button data-mode="mtd">当月</button>
      <button data-mode="month">前月</button>
    </div>
    <span class="period" id="period"></span>
    <span class="note" id="cnt"></span>
  </div>
</header>
<main>
  <div class="tabs" id="metricTabs">
    <button data-k="diamond" class="active">💎 ダイヤ</button>
    <button data-k="timeSec">⏱️ 配信時間</button>
    <button data-k="newCum">⭐ LUCポイント</button>
    <button data-k="days">📆 配信日数</button>
    <button data-k="videos">🎬 動画投稿</button>
  </div>
  <input class="search" id="q" placeholder="🔍 名前で検索">
  <div id="body"></div>
  <div class="foot" id="foot"></div>
</main>

const DIA={1:1500,2:1000,3:700,4:600,5:500,6:300,7:300,8:300,9:300,10:300};
const TIM={1:500,2:500,3:500,4:300,5:300,6:100,7:100,8:100,9:100,10:100};
let mode='week', metric='diamond';
function computeLuc(list){return list.map(c=>({...c, weekLuc:c.weekLuc||0, newCum:(c.newCum!=null?c.newCum:(c.cum||0)), videos:c.videos||0}));}
function cur(){const d=RANKING[mode]; if(!d||!d.creators)return null; return {period:d.period, creators:computeLuc(d.creators)};}
function hm(s){return Math.floor(s/3600)+'時間'+Math.floor((s%3600)/60)+'分';}
function nf(n){return (n||0).toLocaleString();}
function agp(a){const k=a.includes('ITK')&&a.includes('NEO')?'':a==='ITK'?'itk':'neo';return `<span class="pill ${k}">${a}</span>`;}
function esc(s){return (s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
function col(k,label){const on=(metric===k);return '<th class="num c-metric c-'+k+(on?' sorted':'')+'" onclick="setMetric(\''+k+'\')">'+label+'</th>';}
function render(){
  const d=cur();
  const termMap={week:'週間 ',mtd:'当月 ',month:'前月 '};
  document.getElementById('period').textContent = d? (termMap[mode]||'')+d.period : ({week:'—',mtd:'当月：準備中',month:'前月：準備中'}[mode]||'—');
  const bodyEl=document.getElementById('body');
  if(!d){bodyEl.innerHTML='<div class="empty">この期間のデータはまだありません。取得を実行すると表示されます。</div>';document.getElementById('cnt').textContent='';document.getElementById('foot').textContent='';return;}
  const q=document.getElementById('q').value.trim().toLowerCase();
  const pointsView=(metric==='newCum'||metric==='weekLuc');
  let list=d.creators.filter(c=>!q||c.nick.toLowerCase().includes(q)||c.u.includes(q));
  list=pointsView?list.filter(c=>(c.newCum||0)>0):list.filter(c=>c.timeSec>0);
  list.sort((a,b)=>b[metric]-a[metric]);
  document.getElementById('cnt').textContent='';
  let h='<div class="tblwrap"><table class="m-'+metric+' mode-'+mode+'"><thead><tr>'
     +'<th class="rk">#</th><th>名前</th>'
     +col('diamond','ダイヤ')+col('timeSec','配信時間')+col('days','日数')+col('videos','動画投稿')+col('weekLuc','今週LUC')+col('newCum','累計LUC')
     +'</tr></thead><tbody>';
  list.forEach((c,i)=>{
    h+='<tr><td class="rk'+(i<3?' top':'')+'">'+(i+1)+'</td><td class="name">'+esc(c.nick)+'</td>'
      +'<td class="num dia c-metric c-diamond'+(metric==='diamond'?' sorted':'')+'">'+nf(c.diamond)+'</td>'
      +'<td class="num c-metric c-timeSec'+(metric==='timeSec'?' sorted':'')+'">'+hm(c.timeSec)+'</td>'
      +'<td class="num c-metric c-days'+(metric==='days'?' sorted':'')+'">'+c.days+'</td>'
      +'<td class="num c-metric c-videos'+(metric==='videos'?' sorted':'')+'">'+(c.videos||0)+'</td>'
      +'<td class="num c-metric c-weekLuc '+(c.weekLuc>0?'grn':'muted')+(metric==='weekLuc'?' sorted':'')+'">'+(c.weekLuc>0?'+'+nf(c.weekLuc):'-')+'</td>'
      +'<td class="num c-metric c-newCum'+(metric==='newCum'?' sorted':'')+'">'+nf(c.newCum)+'</td></tr>';
  });
  h+='</tbody></table></div>';
  bodyEl.innerHTML=h;
  document.getElementById('foot').textContent='最終更新: '+(RANKING.generated||'')+'　※ダイヤ・配信時間・配信日数は期間内の数字／LUCは累計（今週分を加算）';
}
window.setMetric=function(k){metric=k;document.querySelectorAll('#metricTabs button').forEach(b=>b.classList.toggle('active',b.dataset.k===k));render();};
document.getElementById('modeSeg').addEventListener('click',e=>{if(!e.target.dataset.mode)return;mode=e.target.dataset.mode;document.querySelectorAll('#modeSeg button').forEach(b=>b.classList.toggle('active',b===e.target));render();});
document.getElementById('metricTabs').addEventListener('click',function(e){var b=e.target.closest('button');if(b&&b.dataset.k)setMetric(b.dataset.k);});
document.getElementById('q').addEventListener('input',render);
render();
</script>
