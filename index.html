<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUC ランキング</title>
<style>
:root{--bg:#0f1220;--card:#1a1f35;--card2:#232a45;--txt:#e8ecf5;--mut:#9aa4c4;--acc:#5b8cff;--gold:#ffd35b;--grn:#37d39b;--pnk:#ff6ba9;--line:#2c3352}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
header{padding:18px 16px 12px;background:linear-gradient(135deg,#1c2444,#141a30);border-bottom:1px solid var(--line)}
h1{margin:0;font-size:18px}
.bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:10px}
.seg{display:inline-flex;background:var(--card2);border:1px solid var(--line);border-radius:9px;overflow:hidden}
.seg button{background:none;border:none;color:var(--mut);padding:7px 16px;cursor:pointer;font-size:13px}
.seg button.active{background:var(--acc);color:#fff}
.period{font-size:14px;font-weight:700;color:var(--gold);background:rgba(255,211,91,.12);padding:5px 12px;border-radius:8px}
.note{color:var(--mut);font-size:12px}
main{padding:14px 12px;max-width:1000px;margin:0 auto}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.tabs button{background:var(--card);border:1px solid var(--line);color:var(--mut);padding:9px 14px;border-radius:20px;cursor:pointer;font-size:13px}
.tabs button.active{background:var(--acc);color:#fff;border-color:var(--acc)}
.search{width:100%;max-width:280px;background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:9px 12px;font-size:13px;margin-bottom:12px}
.tblwrap{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:9px 10px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
th{color:var(--mut);font-weight:600;position:sticky;top:0;background:var(--card);cursor:pointer;user-select:none}
th.sorted{color:var(--acc)}
tbody tr:hover{background:var(--card2)}
.num{text-align:right;font-variant-numeric:tabular-nums}
.rk{color:var(--mut);width:34px}
.rk.top{color:var(--gold);font-weight:700}
.pill{font-size:11px;padding:2px 8px;border-radius:20px}
.pill.neo{background:rgba(91,140,255,.18);color:#9db8ff}.pill.itk{background:rgba(255,107,169,.18);color:#ff9ecb}
.gold{color:var(--gold)}.grn{color:var(--grn)}.muted{color:var(--mut)}
.empty{padding:40px;text-align:center;color:var(--mut)}
.foot{color:var(--mut);font-size:11px;text-align:center;padding:16px}
</style>
</head>
<body>
<header>
  <h1>🏆 LUC ランキング（NEO parade + ITK 合算）</h1>
  <div class="bar">
    <div class="seg" id="modeSeg">
      <button data-mode="week" class="active">週間</button>
      <button data-mode="month">月間</button>
    </div>
    <span class="period" id="period"></span>
    <span class="note" id="cnt"></span>
  </div>
</header>
<main>
  <div class="tabs" id="metricTabs">
    <button data-k="diamond" class="active">💎 ダイヤ</button>
    <button data-k="timeSec">⏱️ 配信時間</button>
    <button data-k="weekLuc">⭐ LUCポイント</button>
    <button data-k="days">📆 配信日数</button>
  </div>
  <input class="search" id="q" placeholder="🔍 名前で検索">
  <div id="body"></div>
  <div class="foot" id="foot"></div>
</main>

ash_ru.game", "nick": "ash_ru.game", "agency": "ITK", "cum": 0, "diamond": 0, "timeSec": 0, "days": 0, "lucD": 0, "lucT": 0, "weekLuc": 0, "newCum": 0}, {"u": "umitukiruka", "nick": "umitukiruka", "agency": "ITK", "cum": 0, "diamond": 0, "timeSec": 0, "days": 0, "lucD": 0, "lucT": 0, "weekLuc": 0, "newCum": 0}, {"u": "cabin_koumei", "nick": "cabin_koumei", "agency": "ITK", "cum": 0, "diamond": 0, "timeSec": 0, "days": 0, "lucD": 0, "lucT": 0, "weekLuc": 0, "newCum": 0}, {"u": "denpadaoo", "nick": "denpadaoo", "agency": "ITK", "cum": 0, "diamond": 0, "timeSec": 0, "days": 0, "lucD": 0, "lucT": 0, "weekLuc": 0, "newCum": 0}]}, "month": null};   // {week:{period,creators:[...]}, month:{period,creators}|null}
const DIA={1:1500,2:1000,3:700,4:600,5:500,6:300,7:300,8:300,9:300,10:300};
const TIM={1:500,2:500,3:500,4:300,5:300,6:100,7:100,8:100,9:100,10:100};
let mode='week', metric='diamond';

function computeLuc(list){
  const a=list.map(c=>({...c}));
  [...a].sort((x,y)=>y.diamond-x.diamond).forEach((c,i)=>c.lucD=DIA[i+1]||0);
  [...a].sort((x,y)=>y.timeSec-x.timeSec).forEach((c,i)=>c.lucT=TIM[i+1]||0);
  a.forEach(c=>{c.weekLuc=c.lucD+c.lucT; c.newCum=(c.cum||0)+c.weekLuc;});
  return a;
}
function cur(){const d=RANKING[mode]; if(!d||!d.creators)return null; return {period:d.period, creators:computeLuc(d.creators)};}
function hm(s){return Math.floor(s/3600)+'時間'+Math.floor((s%3600)/60)+'分';}
function nf(n){return (n||0).toLocaleString();}
function agp(a){const k=a.includes('ITK')&&a.includes('NEO')?'':a==='ITK'?'itk':'neo';return `<span class="pill ${k}">${a}</span>`;}

function render(){
  const d=cur();
  document.getElementById('period').textContent = d? (mode==='month'?'月間 ':'週間 ')+d.period : (mode==='month'?'月間：準備中':'—');
  const bodyEl=document.getElementById('body');
  if(!d){bodyEl.innerHTML='<div class="empty">月間データはまだありません。</div>';document.getElementById('cnt').textContent='';document.getElementById('foot').textContent='';return;}
  const q=document.getElementById('q').value.trim().toLowerCase();
  let list=d.creators.filter(c=>!q||c.nick.toLowerCase().includes(q)||c.u.includes(q));
  list.sort((a,b)=>b[metric]-a[metric]);
  document.getElementById('cnt').textContent='全'+d.creators.length+'名';
  const isLuc = metric==='weekLuc';
  let h='<div class="tblwrap"><table><thead><tr>'
     +'<th class="rk">#</th><th>名前</th><th>所属</th>'
     +col('diamond','ダイヤ')+col('timeSec','配信時間')+col('days','日数')
     +col('weekLuc','今週LUC')+'<th class="num'+(isLuc?' sorted':'')+'">累計LUC</th></tr></thead><tbody>';
  list.forEach((c,i)=>{
    h+='<tr><td class="rk'+(i<3?' top':'')+'">'+(i+1)+'</td><td>'+esc(c.nick)+'</td><td>'+agp(c.agency)+'</td>'
      +'<td class="num gold'+(metric==='diamond'?' sorted':'')+'">'+nf(c.diamond)+'</td>'
      +'<td class="num'+(metric==='timeSec'?' sorted':'')+'">'+hm(c.timeSec)+'</td>'
      +'<td class="num'+(metric==='days'?' sorted':'')+'">'+c.days+'</td>'
      +'<td class="num '+(c.weekLuc>0?'grn':'muted')+(metric==='weekLuc'?' sorted':'')+'">'+(c.weekLuc>0?'+'+nf(c.weekLuc):'-')+'</td>'
      +'<td class="num">'+nf(c.newCum)+'</td></tr>';
  });
  h+='</tbody></table></div>';
  bodyEl.innerHTML=h;
  document.getElementById('foot').textContent='最終更新: '+(RANKING.generated||'')+'　※ダイヤ・配信時間・配信日数は期間内の数字／LUCは累計（今週分を加算）';
}
function col(k,label){const on = (metric===k); return '<th class="num'+(on?' sorted':'')+'" onclick="setMetric(\''+k+'\')">'+label+'</th>';}
function esc(s){return (s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
window.setMetric=function(k){metric=k;document.querySelectorAll('#metricTabs button').forEach(b=>b.classList.toggle('active',b.dataset.k===k));render();};
document.getElementById('metricTabs').addEventListener('click',e=>{if(e.target.dataset.k)setMetric(e.target.dataset.k);});
document.getElementById('modeSeg').addEventListener('click',e=>{if(!e.target.dataset.mode)return;mode=e.target.dataset.mode;document.querySelectorAll('#modeSeg button').forEach(b=>b.classList.toggle('active',b===e.target));render();});
document.getElementById('q').addEventListener('input',render);
render();
</script>
